- name: Launch database container
  docker_container:
    name: database
    image: yellowbobby/tp-devops-database
    state: started
    restart_policy: always
    networks:
      - name: app-network
    env:
      POSTGRES_DB: "db"
      POSTGRES_USER: "usr"
      POSTGRES_PASSWORD: "pwd"
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python